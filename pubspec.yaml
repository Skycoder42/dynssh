name: dynssh
description: A small server utility to dynamically update the SSH configuration for a remote host with dynamic IPs.
version: 1.1.1
publish_to: none

environment:
  sdk: ^3.7.0

platforms:
  linux:
  macos:

executables:
  dynssh:

dependencies:
  args: ^2.7.0
  build_cli_annotations: ^2.1.0
  collection: ^1.19.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  logging: ^1.3.0
  meta: ^1.16.0
  posix: ^6.0.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  shelf: ^1.4.2
  shelf_api: ^1.3.2
  synchronized: ^3.3.1

dev_dependencies:
  build_cli: ^2.2.5
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  dart_pre_commit: ^5.4.4
  dart_test_tools: ^6.1.1
  freezed: ^3.0.3
  http: ^1.3.0
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.5
  riverpod_lint: ^2.6.5
  shelf_api_builder: ^1.2.2
  test: ^1.25.15

dart_pre_commit:
  flutter-compat: false

cider:
  link_template:
    tag: https://github.com/Skycoder42/dynssh/releases/tag/v%tag%
    diff: https://github.com/Skycoder42/dynssh/compare/v%from%...v%to%
