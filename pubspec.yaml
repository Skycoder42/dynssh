name: dynssh
description: A small server utility to dynamically update the SSH configuration for a remote host with dynamic IPs.
version: 1.0.9
publish_to: none

environment:
  sdk: ^3.6.0

platforms:
  linux:
  macos:

executables:
  dynssh:

dependencies:
  args: ^2.6.0
  build_cli_annotations: ^2.1.0
  collection: ^1.19.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logging: ^1.3.0
  meta: ^1.16.0
  posix: ^6.0.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  shelf: ^1.4.2
  shelf_api: ^1.3.0+1
  synchronized: ^3.3.0+3

dev_dependencies:
  build_cli: ^2.2.4
  build_runner: ^2.4.14
  custom_lint: ^0.7.0
  dart_pre_commit: ^5.4.1
  dart_test_tools: ^6.0.1
  freezed: ^2.5.7
  http: ^1.2.2
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  shelf_api_builder: ^1.2.0+1
  test: ^1.25.14

dart_pre_commit:
  flutter-compat: false

cider:
  link_template:
    tag: https://github.com/Skycoder42/dynssh/releases/tag/v%tag%
    diff: https://github.com/Skycoder42/dynssh/compare/v%from%...v%to%
