name: dynssh
description: A small server utility to dynamically update the SSH configuration for a remote host with dynamic IPs.
version: 1.1.4
publish_to: none

environment:
  sdk: ^3.11.0

platforms:
  linux:
  macos:

executables:
  dynssh:

dependencies:
  args: ^2.7.0
  build_cli_annotations: ^2.1.1
  collection: ^1.19.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0
  logging: ^1.3.0
  meta: ^1.17.0
  posix: ^6.0.3
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  shelf: ^1.4.2
  shelf_api: ^1.4.2
  synchronized: ^3.4.0

dev_dependencies:
  build_cli: ^2.2.10
  build_runner: ^2.11.1
  dart_pre_commit: ^6.1.0
  dart_test_tools: ^7.0.1
  freezed: ^3.2.5
  http: ^1.6.0
  json_serializable: ^6.12.0
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  shelf_api_builder: ^1.3.2
  test: ^1.29.0

dart_pre_commit:
  flutter-compat: false

cider:
  link_template:
    tag: https://github.com/Skycoder42/dynssh/releases/tag/v%tag%
    diff: https://github.com/Skycoder42/dynssh/compare/v%from%...v%to%
