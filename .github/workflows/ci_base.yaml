on:
  workflow_call:
    outputs:
      enabledPlatforms:
        value: ${{ jobs.ci.outputs.enabledPlatforms }}
jobs:
  ci:
    name: CI
    uses: Skycoder42/dart_test_tools/.github/workflows/dart.yml@main
    with:
      buildRunner: true
      unitTestPaths: -P unit
      coverageExclude: >-
        "**/*.freezed.dart"
        "**/*.g.dart"
        "**/*.api.dart"
      integrationTestPaths: -P integration
      integrationTestSetup: >-
        {
          "linux": "./tool/integration-test-setup.sh true",
          "macos": "./tool/integration-test-setup.sh false"
        }
